name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: cd app && npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: cd app && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: app/out/

  deploy-infra:
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      site_bucket: ${{ steps.outputs.outputs.site_bucket }}
      dist_id: ${{ steps.outputs.outputs.dist_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: cd infra && npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - run: cd infra && npx cdk deploy GkConsulting --require-approval never

      - name: Get stack outputs
        id: outputs
        run: |
          SITE_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name GkConsulting \
            --query "Stacks[0].Outputs[?OutputKey=='SiteBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name GkConsulting \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          echo "site_bucket=$SITE_BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT

  sync-site:
    needs: [build-site, deploy-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site-out
          path: site-out

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync hashed assets (immutable cache)
        env:
          BUCKET: ${{ needs.deploy-infra.outputs.site_bucket }}
        run: |
          aws s3 sync ./site-out s3://${BUCKET} \
            --delete \
            --exclude "*" --include "_next/static/*" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML and root files (short cache)
        env:
          BUCKET: ${{ needs.deploy-infra.outputs.site_bucket }}
        run: |
          aws s3 sync ./site-out s3://${BUCKET} \
            --exclude "_next/static/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        env:
          DIST_ID: ${{ needs.deploy-infra.outputs.dist_id }}
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${DIST_ID} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id ${DIST_ID} \
            --id ${INVALIDATION_ID}
